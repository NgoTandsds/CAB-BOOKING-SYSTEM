apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: cab-booking
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: cab-booking/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cab-booking-secrets
                  key: JWT_SECRET
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: cab-booking-config
                  key: REDIS_URL
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: cab-booking-config
                  key: AUTH_SERVICE_URL
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: cab-booking-config
                  key: USER_SERVICE_URL
            - name: DRIVER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: cab-booking-config
                  key: DRIVER_SERVICE_URL
            - name: BOOKING_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: cab-booking-config
                  key: BOOKING_SERVICE_URL
            - name: RIDE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: cab-booking-config
                  key: RIDE_SERVICE_URL
            - name: PAYMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: cab-booking-config
                  key: PAYMENT_SERVICE_URL
            - name: PRICING_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: cab-booking-config
                  key: PRICING_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: cab-booking-config
                  key: NOTIFICATION_SERVICE_URL
            - name: REVIEW_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: cab-booking-config
                  key: REVIEW_SERVICE_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: cab-booking
spec:
  selector:
    app: api-gateway
  type: LoadBalancer
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: cab-booking
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
